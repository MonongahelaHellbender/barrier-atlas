name: Barrier Atlas check

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * *"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install signing dependencies
        run: python3 -m pip install -r requirements-signing.txt

      # The one-directional safety property is the load-bearing claim: checkers
      # must fail CLOSED. The tamper test is environment-independent (sha256 binding,
      # no toolchain needed); the axiom-lie test self-skips honestly when Lean is
      # absent. Either way this step must pass.
      - name: One-directional safety tests
        run: python3 tests/test_one_directional.py

      - name: Encoder bindings
        run: |
          python3 tools/encoder_check.py certs/samples_w33.cert w33
          python3 tools/encoder_check.py certs/samples_r34.cert r34
          python3 tools/encoder_check.py certs/hybrid_schur_vdw_3color_13.cert hybrid13

      - name: R3 differential fuzzer
        run: python3 tools/rup_differential_fuzzer.py --cases 64

      - name: Hybrid Schur-vdW finite barrier
        run: |
          python3 tools/hybrid_schur_vdw_check.py --n 13 --colors 3
          python3 tools/hybrid_schur_vdw_cert.py --json

      - name: Spec conformance
        run: |
          python3 spec/validate.py
          python3 spec/conformance/run_conformance.py --runner "python3 tools/plugin_runner.py"

      - name: Signed verdict attestations
        run: python3 tests/test_phase_e_attestation.py

      - name: Lean decision-table bridge
        run: python3 tests/test_decision_table.py

      - name: Invariant fuzzer
        env:
          FUZZ_CASES: ${{ github.event_name == 'schedule' && '50000' || '2000' }}
        run: python3 tests/test_invariant_fuzz.py --cases "$FUZZ_CASES"

      # Always-valid invariant on a bare runner: re-checking the atlas must never
      # REFUSE a live barrier. Without the Lean toolchain the lratcheck/lean-axioms
      # entries degrade to UNVERIFIABLE-HERE (exit 0); nothing should ever be REFUSED.
      - name: Atlas must never REFUSE
        run: |
          set -euo pipefail
          out="$(python3 tools/barrier_check.py)"
          echo "$out"
          echo "$out" | grep -q "0 refused" || { echo "A barrier was REFUSED"; exit 1; }
